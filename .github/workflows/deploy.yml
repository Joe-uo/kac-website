name: Deploy to Namecheap

env:
  # apply to all jobs and steps
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # opt into Node.js 24 early to avoid warnings
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    # use latest checkout to avoid node 20 deprecation warnings
    - name: Checkout repository
      uses: actions/checkout@v4
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    - name: Debug - Verify secrets exist
      run: |
        if [ -z "${{ secrets.FTP_HOST }}" ]; then echo "❌ FTP_HOST is empty"; else echo "✅ FTP_HOST exists"; fi
        if [ -z "${{ secrets.FTP_USER }}" ]; then echo "❌ FTP_USER is empty"; else echo "✅ FTP_USER exists"; fi
        if [ -z "${{ secrets.FTP_PASS }}" ]; then echo "❌ FTP_PASS is empty"; else echo "✅ FTP_PASS exists"; fi
    
    - name: Deploy to Namecheap via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_HOST }}
        username: ${{ secrets.FTP_USER }}
        password: ${{ secrets.FTP_PASS }}
        local-dir: './'
        server-dir: '/public_html/'
        protocol: 'ftp'
        port: 21
        
    - name: Deployment Status
      if: success()
      run: echo "✅ Site deployed to Namecheap via FTP!"
    
    - name: Deployment Failed
      if: failure()
      run: echo "❌ Deployment failed - check FTP credentials and connectivity"
